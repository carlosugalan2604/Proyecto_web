<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DI-PYMES Login</title>
    
    <link rel="stylesheet" href="style_login.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <main class="login-wrapper">
        
        <h1 class="login-title">DI-PYMES</h1>

        <div class="login-bar">
            <input type="email" placeholder="Correo electrónico" required />
            <input type="password" placeholder="Contraseña" required />
            <button type="submit">Iniciar Sesión</button>
        </div>

        <div class="circles-row">
            
            <div class="circle-item">
                <div class="circle-icon"><i class="fas fa-clipboard-list"></i></div>
                <span class="circle-label">Gestión de Tareas</span>
            </div>

            <div class="circle-item">
                <div class="circle-icon"><i class="fas fa-boxes"></i></div>
                <span class="circle-label">Control de Stock</span>
            </div>

            <div class="circle-item">
                <div class="circle-icon"><i class="fas fa-euro-sign"></i></div>
                <span class="circle-label">Finanzas Claras</span>
            </div>

            <div class="circle-item">
                <div class="circle-icon"><i class="fas fa-users"></i></div>
                <span class="circle-label">Base de Datos<br>Clientes</span>
            </div>

        </div>

    </main>

</body>
</html>
